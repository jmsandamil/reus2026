<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Castelló · Torneo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1e;
  color:#fff;
  padding:16px;
}

h1{color:#38bdf8}

h2{
  margin-top:20px;
  color:#f0b429;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  border:1px solid rgba(255,255,255,0.08);
  display:grid;
  grid-template-columns:80px 1fr auto;
  gap:10px;
}

.cat{
  font-size:10px;
  color:#64748b;
}

.hora{
  color:#f0b429;
  font-weight:bold;
}

.resultado{
  font-weight:bold;
}

.section{
  margin-bottom:30px;
}
</style>
</head>

<body>

<h1>NBF Castelló</h1>

<div id="content">Cargando...</div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1972783032";

const PROXY = "https://corsproxy.io/?";

async function load(){

  const res = await fetch(PROXY + encodeURIComponent(SHEET));
  const csv = await res.text();

  const rows = csv.split("\n").map(r =>
    r.split(",").map(c => c.replace(/"/g,"").trim())
  );

  const data = parse(rows);

  render(data);
}


// 🧠 PARSER INTELIGENTE
function parse(rows){

  const partidos = [];

  const isHour = v => /\d{1,2}:\d{2}/.test(v);

  const isTeam = v =>
    v &&
    isNaN(v) &&
    v.length > 2 &&
    !v.includes("PFA") &&
    !v.includes("CLASS");

  for(let r=0;r<rows.length;r++){

    for(let c=0;c<rows[r].length;c++){

      const cell = rows[r][c];

      if(!cell) continue;

      // 🟣 detectar categoría
      let categoria = null;

      if(cell.includes("PFA")) categoria = "PFA";
      if(cell.includes("MFA")) categoria = "MFA";
      if(cell.includes("MFB")) categoria = "MFB";

      if(!categoria) continue;

      const hora = rows[r][0] || "--:--";

      const equipos = rows[r].filter(isTeam);

      if(equipos.length < 2) continue;

      const eq1 = equipos[0];
      const eq2 = equipos[1];

      const resL = rows[r+1]?.[c+1] || "";
      const resV = rows[r+1]?.[c+2] || "";

      partidos.push({
        categoria,
        hora,
        l:eq1,
        v:eq2,
        resL,
        resV
      });
    }
  }

  return partidos;
}


// 📊 RENDER AGRUPADO
function render(data){

  const pfa = data.filter(p => p.categoria === "PFA");
  const otros = data.filter(p => p.categoria !== "PFA");

  let html = "";

// 🟣 PFA primero
html += `<h2>🔥 PFA (Prioridad)</h2>`;
pfa.forEach(p=>{
  html += card(p);
});

// 🔵 resto
html += `<h2>Otros partidos</h2>`;
otros.forEach(p=>{
  html += card(p);
});

document.getElementById("content").innerHTML = html;
}


// 🧱 CARD
function card(p){
  return `
  <div class="card">
    <div class="hora">${p.hora}</div>

    <div>
      <div>${p.l}</div>
      <div class="cat">${p.v}</div>
    </div>

    <div class="resultado">
      ${p.resL && p.resV ? p.resL+"-"+p.resV : "vs"}
    </div>
  </div>`;
}

load();

</script>

</body>
</html>
