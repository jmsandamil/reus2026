<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Castelló · Monitor</title>

<style>
:root {
  --bg:#0a0f1e; --surface:#111827; --border:rgba(255,255,255,0.07);
  --accent:#38bdf8; --text:#f1f5f9; --muted:#64748b;
}
body {
  background:var(--bg); color:var(--text);
  font-family:sans-serif; margin:0; padding:20px;
}
h1 { color:var(--accent); }

.partido-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  display:grid;
  grid-template-columns:80px 1fr auto;
  gap:10px;
}
.partido-hora { font-weight:bold; color:#f0b429; }
.equipo { font-size:14px; }
.resultado { font-weight:bold; }

.tabla-wrap {
  margin-top:20px;
  background:var(--surface);
  border-radius:10px;
  overflow:hidden;
}
table { width:100%; border-collapse:collapse; }
td,th { padding:10px; border-bottom:1px solid var(--border); }
th { color:var(--muted); font-size:12px; }
</style>
</head>

<body>

<h1>NBF Castelló</h1>

<div id="status">Cargando...</div>

<h2>Partidos</h2>
<div id="panel-partidos">Cargando datos...</div>

<h2>Clasificación</h2>
<div id="panel-clasificacion"></div>


<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1972783032";
const PROXY = "https://corsproxy.io/?";
const MI_EQUIPO = "NBF CASTELLÓ A";

async function cargar() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(SHEET_URL + "&t=" + Date.now()));
    const csv = await res.text();

    const rows = csv.split("\n").map(r => r.split(",").map(c => c.trim().replace(/"/g,'')));

    const partidos = parsear(rows);
    render(partidos);

    setStatus("EN VIVO");

  } catch (e) {
    console.error(e);
    setStatus("ERROR");
  }
}


// 🔍 Detecta partidos en el Excel
function parsear(rows) {
  const partidos = [];

  for (let f = 0; f < rows.length; f++) {
    for (let c = 0; c < rows[f].length; c++) {

      const val = rows[f][c];

      if (!isNaN(parseInt(val)) && val.length <= 3) {

        const hora = buscarHora(rows, f);
        const pista = buscarPista(rows, f, c);

        const eqL = rows[f - 1]?.[c + 1] || "";
        const eqV = rows[f - 1]?.[c + 2] || "";

        const resL = rows[f]?.[c + 1] || "";
        const resV = rows[f]?.[c + 2] || "";

        if (eqL && eqV) {
          partidos.push({hora, pista, l:eqL, v:eqV, resL, resV});
        }
      }
    }
  }

  return partidos;
}


// 🧠 Buscar hora hacia arriba
function buscarHora(rows, f) {
  for (let i = f; i >= 0; i--) {
    const cell = rows[i][0];
    if (cell && cell.match(/\d{1,2}:\d{2}/)) return cell;
  }
  return "--:--";
}


// 🧠 Buscar pista
function buscarPista(rows, f, c) {
  for (let i = f; i >= 0; i--) {
    const cell = rows[i][c];
    if (cell && cell.match(/P\d+/i)) return cell;
  }
  return "P?";
}


// 🎨 Render partidos
function render(partidos) {

  const panelP = document.getElementById("panel-partidos");
  if (!panelP) return;

  let html = "";

  partidos.forEach(p => {
    html += `
    <div class="partido-card">
      <div class="partido-hora">
        ${p.hora}<br><small>${p.pista}</small>
      </div>
      <div>
        <div class="equipo">${p.l}</div>
        <div class="equipo">${p.v}</div>
      </div>
      <div class="resultado">
        ${(p.resL && p.resV) ? p.resL + "-" + p.resV : "vs"}
      </div>
    </div>`;
  });

  panelP.innerHTML = html;

  generarClasificacion(partidos);
}


// 📊 Clasificación
function generarClasificacion(partidos) {

  const stats = {};

  partidos.forEach(p => {
    if (!stats[p.l]) stats[p.l] = {pj:0, pg:0, pf:0, pc:0, pts:0};
    if (!stats[p.v]) stats[p.v] = {pj:0, pg:0, pf:0, pc:0, pts:0};

    if (p.resL && p.resV) {
      const rl = parseInt(p.resL);
      const rv = parseInt(p.resV);

      stats[p.l].pj++; stats[p.v].pj++;
      stats[p.l].pf += rl; stats[p.l].pc += rv;
      stats[p.v].pf += rv; stats[p.v].pc += rl;

      if (rl > rv) {
        stats[p.l].pg++; stats[p.l].pts += 2; stats[p.v].pts += 1;
      } else {
        stats[p.v].pg++; stats[p.v].pts += 2; stats[p.l].pts += 1;
      }
    }
  });

  const panelC = document.getElementById("panel-clasificacion");
  if (!panelC) return;

  let html = `<div class="tabla-wrap"><table>
  <thead><tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PTS</th><th>+/-</th></tr></thead><tbody>`;

  Object.entries(stats).forEach(([n,s]) => {
    html += `<tr>
      <td>${n}</td>
      <td>${s.pj}</td>
      <td>${s.pg}</td>
      <td>${s.pts}</td>
      <td>${s.pf - s.pc}</td>
    </tr>`;
  });

  html += "</tbody></table></div>";

  panelC.innerHTML = html;
}


// estado
function setStatus(txt) {
  const el = document.getElementById("status");
  if (el) el.innerText = txt;
}


cargar();
setInterval(cargar, 60000);
</script>

</body>
</html>
