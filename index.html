<script>
const SHEET_JSON = "https://opensheet.elk.sh/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/470734480";
const MI_EQUIPO = "NBF CASTELLÓ A";

async function cargar() {
  try {
    const res = await fetch(SHEET_JSON + "?t=" + Date.now());
    const data = await res.json();

    const partidos = parsearPartidos(data);
    render(partidos);

    document.getElementById('status-dot').className = 'ok';
    document.getElementById('status-txt').innerText = 'EN VIVO';
    document.getElementById('last-update').innerText =
      new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  } catch (e) {
    console.error(e);
    document.getElementById('status-txt').innerText = 'ERROR RED';
  }
}


// 🔍 Detecta partidos automáticamente
function parsearPartidos(data) {
  const partidos = [];

  data.forEach(row => {
    const values = Object.values(row).map(v => (v || "").trim());

    // Detectar filas que parecen partidos
    const equipos = values.filter(v => v.length > 3 && isNaN(v));

    if (equipos.length >= 2) {
      const hora = values.find(v => v.match(/\d{1,2}:\d{2}/)) || "--:--";
      const pista = values.find(v => v.match(/P\d+/i)) || "P?";

      const nums = values.filter(v => !isNaN(parseInt(v)));
      let resL = "", resV = "";

      if (nums.length >= 2) {
        resL = nums[0];
        resV = nums[1];
      }

      partidos.push({
        hora,
        pista,
        l: equipos[0],
        v: equipos[1],
        resL,
        resV
      });
    }
  });

  return partidos;
}


// 🎨 Render partidos + clasificación
function render(partidos) {

  // ORDENAR POR HORA
  partidos.sort((a,b) => a.hora.localeCompare(b.hora));

  // PARTIDOS
  let htmlP = '';

  partidos.forEach(p => {
    const esMio = p.l.includes('NBF') || p.v.includes('NBF');

    htmlP += `
      <div class="partido-card ${esMio ? 'mi-partido' : ''}">
        <div class="partido-hora">
          <div>${p.hora}</div>
          <div style="font-size:9px; color:var(--muted); margin-top:4px;">${p.pista}</div>
        </div>
        <div>
          <div class="equipo ${p.l.includes('NBF') ? 'destacado' : ''}">${p.l}</div>
          <div class="equipo ${p.v.includes('NBF') ? 'destacado' : ''}">${p.v}</div>
        </div>
        <div class="resultado">
          ${(p.resL && p.resV) ? p.resL + '-' + p.resV : 'vs'}
        </div>
      </div>`;
  });

  document.getElementById('panel-partidos').innerHTML = htmlP;


  // 📊 CLASIFICACIÓN
  const stats = {};

  partidos.forEach(p => {
    if (!stats[p.l]) stats[p.l] = {pj:0, pg:0, pf:0, pc:0, pts:0};
    if (!stats[p.v]) stats[p.v] = {pj:0, pg:0, pf:0, pc:0, pts:0};

    if (p.resL !== "" && p.resV !== "") {
      const rl = parseInt(p.resL);
      const rv = parseInt(p.resV);

      stats[p.l].pj++;
      stats[p.v].pj++;

      stats[p.l].pf += rl;
      stats[p.l].pc += rv;

      stats[p.v].pf += rv;
      stats[p.v].pc += rl;

      if (rl > rv) {
        stats[p.l].pg++;
        stats[p.l].pts += 2;
        stats[p.v].pts += 1;
      } else {
        stats[p.v].pg++;
        stats[p.v].pts += 2;
        stats[p.l].pts += 1;
      }
    }
  });

  const sorted = Object.entries(stats).sort(
    (a,b) => b[1].pts - a[1].pts || (b[1].pf-b[1].pc) - (a[1].pf-a[1].pc)
  );

  let htmlC = `
    <div class="tabla-wrap">
    <table>
    <thead>
      <tr>
        <th>Equipo</th><th>PJ</th><th>PG</th><th>PTS</th><th>+/-</th>
      </tr>
    </thead><tbody>`;

  sorted.forEach(([nom, s]) => {
    htmlC += `
      <tr class="${nom === MI_EQUIPO ? 'mi-fila' : ''}">
        <td>${nom}</td>
        <td>${s.pj}</td>
        <td>${s.pg}</td>
        <td>${s.pts}</td>
        <td>${s.pf - s.pc}</td>
      </tr>`;
  });

  htmlC += "</tbody></table></div>";

  document.getElementById('panel-clasificacion').innerHTML = htmlC;
}


cargar();
setInterval(cargar, 60000);
</script>
