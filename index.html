<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Castelló · Monitor Reus 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235; --border: rgba(255,255,255,0.07);
    --accent-nbf: #38bdf8; --gold: #f0b429; --text: #f1f5f9;
    --muted: #64748b; --green: #4ade80; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding-bottom: 4rem; }
  header { border-bottom: 1px solid var(--border); padding: 2rem 1.5rem 0; max-width: 900px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  h1 span { color: var(--accent-nbf); }
  .refresh-info { text-align: right; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .btn-check { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; font-family: 'DM Mono'; }
  #alerta-cambio { display: none; background: rgba(248, 113, 113, 0.15); border: 1px solid var(--red); color: var(--red); padding: 1rem; border-radius: 8px; margin: 1.5rem 1.5rem 0; font-size: 12px; font-family: 'DM Mono'; }
  .tabs { display: flex; margin-top: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'DM Mono'; font-size: 11px; padding: 0.65rem 1.2rem; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent; text-transform: uppercase; }
  .tab.active { color: var(--accent-nbf); border-bottom-color: var(--accent-nbf); }
  main { max-width: 900px; margin: 1.5rem auto; padding: 0 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }
  .section-label { font-family: 'DM Mono'; font-size: 10px; text-transform: uppercase; color: var(--muted); margin: 1.5rem 0 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .partido-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 8px; display: grid; grid-template-columns: 85px 1fr auto; align-items: center; gap: 1rem; }
  .mi-partido { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.05); }
  .partido-hora { font-family: 'DM Mono'; font-size: 16px; color: var(--gold); }
  .hora-cambiada { color: var(--red) !important; font-weight: bold; }
  .pista-tag { display: block; font-size: 9px; color: var(--muted); margin-top: 2px; }
  .equipo { font-size: 13px; font-weight: 600; color: #94a3b8; }
  .equipo.destacado { color: var(--text); }
  .resultado { font-family: 'DM Mono'; font-size: 16px; color: var(--accent-nbf); font-weight: bold; }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <div style="font-family:'DM Mono'; font-size:10px; color:var(--muted); margin-bottom:4px;">SALLE REUS 2026</div>
      <h1><span>NBF</span> Castelló</h1>
    </div>
    <div class="refresh-info">
      <div><span id="status-dot" style="display:inline-block; width:6px; height:6px; border-radius:50%; background:gray; margin-right:5px;"></span><span id="status-txt">conectando</span></div>
      <div id="last-update">--:--</div>
      <button class="btn-check" onclick="cargarTodo()">REINTENTAR</button>
    </div>
  </div>
  <div class="tabs"><button class="tab active" onclick="showTab('partidos',this)">Partidos</button></div>
</header>
<div id="alerta-cambio"><strong>⚠️ AVISO:</strong> Horarios modificados o error en la lectura de nombres.</div>
<main><div id="panel-partidos" class="panel active">Cargando datos...</div></main>
<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=470734480';
const PROXY = 'https://corsproxy.io/?';
const MI_EQUIPO = 'NBF CASTELLÓ A';

const REFERENCIA = {
  71: {h:"12:00", p:"PLOMS 4"}, 72: {h:"15:00", p:"PLOMS 4"}, 76: {h:"17:00", p:"BARRI GAUDÍ 1"},
  77: {h:"09:00", p:"BARRI GAUDÍ 1"}, 73: {h:"10:00", p:"BARRI GAUDÍ 1"}, 78: {h:"12:00", p:"BARRI GAUDÍ 1"},
  74: {h:"16:00", p:"BARRI GAUDÍ 1"}, 79: {h:"17:00", p:"BARRI GAUDÍ 2"}, 75: {h:"17:00", p:"BARRI GAUDÍ 2"}, 80: {h:"20:00", p:"PLOMS 4"},
  81: {h:"10:00", p:"PLOMS 4"}, 82: {h:"09:00", p:"PLOMS 4"}, 83: {h:"11:00", p:"PLOMS 4"}
};

const ESTRUCTURA = [
  { dia: 'Viernes 1 Mayo', ids: [71, 72, 76] },
  { dia: 'Sábado 2 Mayo', ids: [77, 73, 78, 74, 79, 75, 80] },
  { dia: 'Domingo 3 Mayo (Finales)', ids: [82, 81, 83] }
];

async function cargarTodo() {
  document.getElementById('status-dot').style.background = "orange";
  try {
    const resp = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
    const csv = await resp.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));
    let enc = {}; let cambios = false;

    rows.forEach(row => {
      row.forEach((cell, idx) => {
        const id = parseInt(cell);
        if (!isNaN(id) && id >= 71 && id <= 83) {
          // Buscador mejorado: busca textos que no sean números ni horas
          const datosFila = row.filter(c => c !== "" && c !== cell);
          const hora = datosFila.find(c => c.includes(':')) || "--:--";
          const equipos = datosFila.filter(c => !c.includes(':') && isNaN(parseInt(c)));
          
          enc[id] = {
            id: id,
            hora: hora,
            l: equipos[0] || "TBD",
            v: equipos[1] || "TBD",
            resL: row.find((c, i) => i > idx && !isNaN(parseInt(c)) && !c.includes(':')),
            resV: row.findLast((c, i) => i > idx && !isNaN(parseInt(c)) && !c.includes(':'))
          };
          if (REFERENCIA[id] && hora.replace('h','') !== REFERENCIA[id].h) cambios = true;
        }
      });
    });

    document.getElementById('alerta-cambio').style.display = cambios ? 'block' : 'none';
    render(enc);
    document.getElementById('status-dot').style.background = "#4ade80";
    document.getElementById('last-update').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch (e) {
    document.getElementById('status-dot').style.background = "#f87171";
  }
}

function render(enc) {
  let htmlP = '';
  ESTRUCTURA.forEach(sec => {
    htmlP += `<div class="section-label">${sec.dia}</div>`;
    sec.ids.forEach(id => {
      const p = enc[id] || {hora:"", l:"TBD", v:"TBD"};
      const ref = REFERENCIA[id] || {h:"", p:""};
      const esMio = p.l.includes('NBF') || p.v.includes('NBF');
      const res = (p.resL && p.resV && p.resL !== p.resV) ? `${p.resL} - ${p.resV}` : 'vs';

      htmlP += `
        <div class="partido-card ${esMio ? 'mi-partido' : ''}">
          <div class="partido-hora">${p.hora || ref.h}<span class="pista-tag">${ref.p}</span></div>
          <div>
            <div class="equipo ${p.l.includes('NBF') ? 'destacado' : ''}">${p.l}</div>
            <div class="equipo ${p.v.includes('NBF') ? 'destacado' : ''}">${p.v}</div>
          </div>
          <div class="resultado">${res}</div>
        </div>`;
    });
  });
  document.getElementById('panel-partidos').innerHTML = htmlP;
}
function showTab(name, el) { cargarTodo(); }
cargarTodo();
setInterval(cargarTodo, 120000);
</script>
</body>
</html>
