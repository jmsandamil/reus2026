<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1972783032";
const PROXY = "https://corsproxy.io/?";
const MI_EQUIPO = "NBF CASTELLÓ A";

async function cargar() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(SHEET_URL + "&t=" + Date.now()));
    const csv = await res.text();

    const rows = csv.split("\n").map(r => r.split(",").map(c => c.trim().replace(/"/g,'')));

    const partidos = parsear(rows);
    render(partidos);

    setStatus("EN VIVO");

  } catch (e) {
    console.error(e);
    document.getElementById("panel-partidos").innerHTML = "<div style='color:red'>Error cargando datos</div>";
    setStatus("ERROR");
  }
}


// 🔍 Parser inteligente (busca patrones reales)
function parsear(rows) {
  const partidos = [];

  for (let f = 0; f < rows.length; f++) {
    for (let c = 0; c < rows[f].length; c++) {

      const val = rows[f][c];

      // detectar IDs tipo 71,72...
      if (!isNaN(parseInt(val)) && val.length <= 3) {

        const hora = buscarHora(rows, f);
        const pista = buscarPista(rows, f, c);

        const eqL = rows[f - 1]?.[c + 1] || "TBD";
        const eqV = rows[f - 1]?.[c + 2] || "TBD";

        const resL = rows[f]?.[c + 1] || "";
        const resV = rows[f]?.[c + 2] || "";

        if (eqL !== "TBD" && eqV !== "TBD") {
          partidos.push({hora, pista, l: eqL, v: eqV, resL, resV});
        }
      }
    }
  }

  return partidos;
}


// 🧠 buscar hora real
function buscarHora(rows, f) {
  for (let i = f; i >= 0; i--) {
    const cell = rows[i][0];
    if (cell && cell.match(/\d{1,2}:\d{2}/)) return cell;
  }
  return "--:--";
}


// 🧠 buscar pista real
function buscarPista(rows, f, c) {
  for (let i = f; i >= 0; i--) {
    const cell = rows[i][c];
    if (cell && cell.match(/P\d+/i)) return cell;
  }
  return "P?";
}


// 🎨 render
function render(partidos) {

  let html = "";

  partidos.forEach(p => {
    const esMio = p.l.includes("NBF") || p.v.includes("NBF");

    html += `
    <div class="partido-card ${esMio ? 'mi-partido' : ''}">
      <div class="partido-hora">
        <div>${p.hora}</div>
        <div style="font-size:9px;color:var(--muted)">${p.pista}</div>
      </div>
      <div>
        <div class="equipo">${p.l}</div>
        <div class="equipo">${p.v}</div>
      </div>
      <div class="resultado">
        ${(p.resL && p.resV) ? p.resL + "-" + p.resV : "vs"}
      </div>
    </div>`;
  });

  document.getElementById("panel-partidos").innerHTML = html;

  generarClasificacion(partidos);
}


// 📊 clasificación
function generarClasificacion(partidos) {
  const stats = {};

  partidos.forEach(p => {
    if (!stats[p.l]) stats[p.l] = {pj:0, pg:0, pf:0, pc:0, pts:0};
    if (!stats[p.v]) stats[p.v] = {pj:0, pg:0, pf:0, pc:0, pts:0};

    if (p.resL && p.resV) {
      const rl = parseInt(p.resL);
      const rv = parseInt(p.resV);

      stats[p.l].pj++; stats[p.v].pj++;

      stats[p.l].pf += rl; stats[p.l].pc += rv;
      stats[p.v].pf += rv; stats[p.v].pc += rl;

      if (rl > rv) {
        stats[p.l].pg++; stats[p.l].pts += 2; stats[p.v].pts += 1;
      } else {
        stats[p.v].pg++; stats[p.v].pts += 2; stats[p.l].pts += 1;
      }
    }
  });

  let html = `<div class="tabla-wrap"><table><thead>
  <tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PTS</th><th>+/-</th></tr>
  </thead><tbody>`;

  Object.entries(stats).forEach(([n,s]) => {
    html += `<tr><td>${n}</td><td>${s.pj}</td><td>${s.pg}</td><td>${s.pts}</td><td>${s.pf-s.pc}</td></tr>`;
  });

  html += "</tbody></table></div>";

  document.getElementById("panel-clasificacion").innerHTML = html;
}


// estado
function setStatus(txt) {
  const el = document.getElementById("status-txt");
  if (el) el.innerText = txt;
}

cargar();
setInterval(cargar, 60000);
</script>
