<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Hores Salle Reus 2026 · NBF Castelló</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent-nbf: #38bdf8;
    --accent-castello: #f472b6;
    --gold: #f0b429;
    --text: #f1f5f9;
    --muted: #64748b;
    --green: #4ade80;
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 0;
    position: relative;
    overflow: hidden;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .torneo-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; }
  h1 .nbf { color: var(--accent-nbf); }
  h1 .castello { color: var(--accent-castello); }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 0.5rem; font-family: 'DM Mono', monospace; }
  
  .refresh-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }
  #status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin-right: 5px; }
  #status-dot.ok { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .tabs { display: flex; max-width: 900px; margin: 1.5rem auto 0; padding: 0 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'DM Mono', monospace; font-size: 11px; padding: 0.65rem 1.2rem; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; text-transform: uppercase; }
  .tab.active { color: var(--accent-nbf); border-bottom-color: var(--accent-nbf); }

  main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin: 2rem 0 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-label.destacada { color: var(--accent-nbf); }

  .partido-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 1rem;
  }
  .mi-partido { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.03); }
  .partido-hora { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--gold); }
  .partido-hora small { display: block; font-size: 10px; color: var(--muted); }
  .equipo { font-size: 14px; font-weight: 600; color: var(--muted); }
  .equipo.destacado { color: var(--text); }
  .resultado { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--accent-nbf); font-weight: bold; }
  .resultado.pendiente { font-size: 10px; color: var(--muted); opacity: 0.6; }

  .tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; }
  .tabla-clas { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; }
  .tabla-clas th { padding: 10px; text-align: left; background: var(--surface2); color: var(--muted); font-size: 9px; }
  .tabla-clas td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
  .mi-equipo td { color: var(--accent-nbf); background: rgba(56,189,248,0.05); }

  @media (max-width: 500px) {
    .partido-card { grid-template-columns: 60px 1fr; }
    .partido-meta { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="torneo-label">12 Hores Minibàsquet · Salle Reus 2026</div>
      <h1><span class="nbf">NBF</span> <span class="castello">Castelló</span></h1>
      <div class="subtitle">Premini Femenino A (PFA) · 1–3 mayo 2026</div>
    </div>
    <div class="refresh-info">
      <div><span id="status-dot"></span><span id="status-txt">cargando...</span></div>
      <div style="margin-top:4px;">Act. <span id="last-update">—</span></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('partidos',this)">Partidos</button>
    <button class="tab" onclick="showTab('clasificacion',this)">Clasificación</button>
  </div>
</header>

<main>
  <div id="panel-partidos" class="panel active">
    <div id="contenido-partidos">Cargando...</div>
  </div>
  <div id="panel-clasificacion" class="panel">
    <div id="contenido-clasificacion">Cargando...</div>
  </div>
</main>

<script>
const SHEET_ID = '1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s';
const GID_PFA  = '470734480';
const MI_EQUIPO = 'NBF CASTELLÓ A';

// Lista completa de partidos según el calendario oficial
const TODOS_PARTIDOS = [
  { num:71, dia:'Viernes 1 mayo', hora:'12:00h', pista:'PLOMS 4',       local:'STADIUM CASABLANCA A', visitante:'NBF CASTELLÓ A' },
  { num:72, dia:'Viernes 1 mayo', hora:'15:00h', pista:'PLOMS 4',       local:'U10F Sant Gregori',    visitante:'STADIUM CASABLANCA A' },
  { num:77, dia:'Sábado 2 mayo',  hora:'09:00h', pista:'BARRI GAUDÍ 1', local:'NBF CASTELLÓ A',       visitante:'TGN' },
  { num:73, dia:'Sábado 2 mayo',  hora:'10:00h', pista:'BARRI GAUDÍ 1', local:'STADIUM CASABLANCA A', visitante:'ESCOLA PUIGCERVER' },
  { num:76, dia:'Sábado 2 mayo',  hora:'12:00h', pista:'BARRI GAUDÍ 1', local:'ESCOLA PUIGCERVER',    visitante:'NBF CASTELLÓ A' },
  { num:74, dia:'Sábado 2 mayo',  hora:'16:00h', pista:'BARRI GAUDÍ 1', local:'TGN',                  visitante:'STADIUM CASABLANCA A' },
  { num:75, dia:'Sábado 2 mayo',  hora:'17:00h', pista:'BARRI GAUDÍ 2', local:'NBF CASTELLÓ A',       visitante:'U10F Sant Gregori' },
  { num:78, dia:'Sábado 2 mayo',  hora:'12:00h', pista:'BARRI GAUDÍ 1', local:'ESCOLA PUIGCERVER',    visitante:'U10F Sant Gregori' },
  { num:79, dia:'Sábado 2 mayo',  hora:'17:00h', pista:'BARRI GAUDÍ 2', local:'U10F Sant Gregori',    visitante:'TGN' },
  { num:80, dia:'Sábado 2 mayo',  hora:'20:00h', pista:'PLOMS 4',       local:'TGN',                  visitante:'ESCOLA PUIGCERVER' },
];

const FINALES = [
  { num:82, hora:'09:00h', pista:'PLOMS 4', desc:'3r y 4º puesto', pos1:'3r', pos2:'4rt' },
  { num:81, hora:'10:00h', pista:'PLOMS 4', desc:'FINAL TÍTULO',   pos1:'1r', pos2:'2n' },
  { num:83, hora:'11:00h', pista:'PLOMS 4', desc:'5º puesto',      pos1:'5è', pos2:'Perdedor 82' },
];

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

async function fetchSheetCSV() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_PFA}`;
  const resp = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
  return await resp.text();
}

function parseCSV(text) {
  return text.split('\n').map(row => row.split(',').map(c => c.replace(/"/g, '').trim()));
}

function extraerResultados(rows) {
  const res = {};
  rows.forEach(row => {
    const num = parseInt(row[0]);
    if (!isNaN(num) && num >= 71 && num <= 83) {
      let scores = row.slice(1).filter(v => /^\d+$/.test(v));
      if (scores.length >= 2) res[num] = { local: parseInt(scores[0]), visit: parseInt(scores[1]) };
    }
    // Capturar quien queda en cada posición para las finales (PFA 1r, etc)
    if (row[0] === 'PFA' && row[1]) {
      if (!res._clas) res._clas = {};
      res._clas[row[1]] = row[2] ? row[2].toUpperCase() : null;
    }
  });
  return res;
}

function renderPartidos(resultados) {
  let html = '';
  const dias = [...new Set(TODOS_PARTIDOS.map(p => p.dia))];
  
  dias.forEach(dia => {
    html += `<div class="section-label">${dia}</div>`;
    TODOS_PARTIDOS.filter(p => p.dia === dia).forEach(p => {
      const r = resultados[p.num];
      const esMio = p.local === MI_EQUIPO || p.visitante === MI_EQUIPO;
      html += `
        <div class="partido-card ${esMio ? 'mi-partido' : ''}">
          <div class="partido-hora">${p.hora}<small>#${p.num}</small></div>
          <div>
            <div class="equipo ${p.local === MI_EQUIPO ? 'destacado' : ''}">${p.local}</div>
            <div class="equipo ${p.visitante === MI_EQUIPO ? 'destacado' : ''}">${p.visitante}</div>
          </div>
          <div class="partido-meta">
            <div class="resultado ${!r ? 'pendiente' : ''}">${r ? r.local + ' - ' + r.visit : 'pendiente'}</div>
            <div style="font-size:9px; color:var(--muted)">${p.pista}</div>
          </div>
        </div>`;
    });
  });

  html += `<div class="section-label destacada">Domingo 3 mayo · Finales</div>`;
  FINALES.forEach(f => {
    const r = resultados[f.num];
    const eq1 = (resultados._clas && resultados._clas[f.pos1]) || f.pos1;
    const eq2 = (resultados._clas && resultados._clas[f.pos2]) || f.pos2;
    html += `
      <div class="partido-card ${eq1===MI_EQUIPO||eq2===MI_EQUIPO ? 'mi-partido' : ''}">
        <div class="partido-hora">${f.hora}<small>#${f.num}</small></div>
        <div>
          <div style="font-size:9px; color:var(--gold); margin-bottom:2px">${f.desc}</div>
          <div class="equipo ${eq1 === MI_EQUIPO ? 'destacado' : ''}">${eq1}</div>
          <div class="equipo ${eq2 === MI_EQUIPO ? 'destacado' : ''}">${eq2}</div>
        </div>
        <div class="partido-meta">
          <div class="resultado ${!r ? 'pendiente' : ''}">${r ? r.local + ' - ' + r.visit : 'pendiente'}</div>
        </div>
      </div>`;
  });
  document.getElementById('contenido-partidos').innerHTML = html;
}

function renderClasificacion(resultados) {
  const equipos = ['STADIUM CASABLANCA A', 'NBF CASTELLÓ A', 'U10F Sant Gregori', 'ESCOLA PUIGCERVER', 'TGN'];
  const stats = {};
  equipos.forEach(e => stats[e] = { pj:0, pg:0, pp:0, pf:0, pc:0 });

  TODOS_PARTIDOS.forEach(p => {
    const r = resultados[p.num];
    if (r && stats[p.local] && stats[p.visitante]) {
      stats[p.local].pj++; stats[p.visitante].pj++;
      stats[p.local].pf += r.local; stats[p.local].pc += r.visit;
      stats[p.visitante].pf += r.visit; stats[p.visitante].pc += r.local;
      if (r.local > r.visit) { stats[p.local].pg++; stats[p.visitante].pp++; }
      else { stats[p.visitante].pg++; stats[p.local].pp++; }
    }
  });

  const sorted = Object.entries(stats)
    .map(([nom, d]) => ({ nom, ...d, pts: d.pg*2 + d.pp, avg: d.pf - d.pc }))
    .sort((a,b) => b.pts - a.pts || b.avg - a.avg);

  let html = `<div class="tabla-wrap"><table class="tabla-clas">
    <thead><tr><th>Pos</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PP</th><th>+/-</th></tr></thead>
    <tbody>`;
  sorted.forEach((e, i) => {
    html += `<tr class="${e.nom === MI_EQUIPO ? 'mi-equipo' : ''}">
      <td>${i+1}</td><td>${e.nom}</td><td>${e.pj}</td><td>${e.pg}</td><td>${e.pp}</td><td>${e.avg}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('contenido-clasificacion').innerHTML = html;
}

async function cargarTodo() {
  try {
    const csv = await fetchSheetCSV();
    const rows = parseCSV(csv);
    const resultados = extraerResultados(rows);
    renderPartidos(resultados);
    renderClasificacion(resultados);
    document.getElementById('status-dot').className = 'ok';
    document.getElementById('status-txt').textContent = 'En vivo';
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('status-txt').textContent = 'Error';
  }
}

cargarTodo();
setInterval(cargarTodo, 60000); // Actualiza cada minuto
</script>
</body>
</html>
