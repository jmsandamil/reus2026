<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Castelló · Monitor Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235; --border: rgba(255,255,255,0.07);
    --accent-nbf: #38bdf8; --gold: #f0b429; --text: #f1f5f9;
    --muted: #64748b; --green: #4ade80; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 0 0 4rem; }
  
  header { border-bottom: 1px solid var(--border); padding: 2rem 1.5rem 0; max-width: 900px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 800; letter-spacing: -0.02em; }
  h1 span { color: var(--accent-nbf); }
  
  .refresh-info { text-align: right; }
  .btn-check { 
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 10px; padding: 6px 12px; border-radius: 4px;
    cursor: pointer; transition: 0.2s; margin-top: 5px;
  }
  .btn-check:hover { background: var(--border); }

  #alerta-cambio { 
    display: none; background: rgba(248, 113, 113, 0.15); border: 1px solid var(--red); 
    color: var(--red); padding: 1rem; border-radius: 8px; margin: 1.5rem 1.5rem 0;
    font-size: 13px; font-family: 'DM Mono', monospace;
  }

  .tabs { display: flex; margin-top: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'DM Mono', monospace; font-size: 11px; padding: 0.65rem 1.2rem; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent; text-transform: uppercase; }
  .tab.active { color: var(--accent-nbf); border-bottom-color: var(--accent-nbf); }

  main { max-width: 900px; margin: 1.5rem auto; padding: 0 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--muted); margin: 1.5rem 0 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .partido-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 8px; display: grid; grid-template-columns: 85px 1fr auto; align-items: center; gap: 1rem; }
  .mi-partido { border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.05); }
  .partido-hora { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--gold); }
  .hora-cambiada { color: var(--red) !important; font-weight: bold; }
  .pista-tag { display: block; font-size: 9px; color: var(--muted); margin-top: 2px; }

  .equipo { font-size: 13px; font-weight: 600; color: #94a3b8; }
  .equipo.destacado { color: var(--text); }
  .resultado { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--accent-nbf); font-weight: bold; }

  .tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; }
  th { padding: 10px; text-align: left; background: var(--surface2); color: var(--muted); font-size: 9px; }
  td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
  .mi-fila { color: var(--accent-nbf); background: rgba(56,189,248,0.05); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div style="font-family:'DM Mono'; font-size:10px; color:var(--muted); margin-bottom:4px;">SALLE REUS 2026</div>
      <h1><span>NBF</span> Castelló</h1>
    </div>
    <div class="refresh-info">
      <div style="font-family:'DM Mono'; font-size:10px; color:var(--muted);">
        <span id="status-dot" style="display:inline-block; width:6px; height:6px; border-radius:50%; background:gray;"></span>
        <span id="status-txt">conectando</span> | <span id="last-update">--:--</span>
      </div>
      <button class="btn-check" onclick="cargar(true)">VERIFICAR HORARIOS</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('partidos',this)">Partidos</button>
    <button class="tab" onclick="showTab('clasificacion',this)">Clasificación</button>
  </div>
</header>

<div id="alerta-cambio">
  <strong>⚠️ CAMBIO DETECTADO</strong><br>
  El horario en el Excel no coincide con el oficial. Revisa los datos en rojo.
</div>

<main>
  <div id="panel-partidos" class="panel active">Cargando...</div>
  <div id="panel-clasificacion" class="panel"></div>
</main>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=470734480';
const PROXY = 'https://corsproxy.io/?';
const MI_EQUIPO = 'NBF CASTELLÓ A';

// UBICACIONES SEGÚN TU LISTADO
const PISTAS = {
  71: "PLOMS 1", 72: "PLOMS 1", 76: "BARRI GAUDÍ", // Viernes
  77: "PLOMS 1", 73: "PLOMS 2", 78: "PLOMS 1", 74: "PLOMS 2", 79: "PLOMS 3", 75: "PLOMS 1", 80: "PLOMS 2", // Sáb
  81: "PLOMS 1", 82: "PLOMS 1", 83: "PLOMS 2" // Dom
};

const REFERENCIA = {
  71: "12:00", 72: "15:00", 76: "17:00", 
  77: "09:00", 73: "10:00", 78: "12:00", 74: "16:00", 79: "17:00", 75: "19:00", 80: "20:00"
};

const ESTRUCTURA = [
  { dia: 'Viernes 1', ids: [71, 72, 76] },
  { dia: 'Sábado 2', ids: [77, 73, 78, 74, 79, 75, 80] },
  { dia: 'Domingo 3 (Finales)', ids: [82, 81, 83] }
];

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

async function cargar(esManual = false) {
  const dot = document.getElementById('status-dot');
  dot.style.background = "orange";
  
  try {
    const response = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
    const csv = await response.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));
    
    let enc = {}; let nombresFinal = {}; let huboCambio = false;

    rows.forEach(row => {
      const id = parseInt(row[0]);
      if (!isNaN(id)) {
        enc[id] = { id, hora: row[1], l: row[2], v: row[3], resL: row[4], resV: row[5] };
        if (REFERENCIA[id] && row[1] !== REFERENCIA[id]) huboCambio = true;
      }
      if (row[0] === 'PFA' && row[2]) nombresFinal[row[1]] = row[2].toUpperCase();
    });

    if (esManual) alert(huboCambio ? "⚠️ ¡Atención! Hay cambios en los horarios respecto al plan original." : "✅ Todo correcto. Los horarios coinciden con el plan oficial.");

    document.getElementById('alerta-cambio').style.display = huboCambio ? 'block' : 'none';
    renderPartidos(enc, nombresFinal);
    renderClasificacion(enc);

    dot.style.background = "#4ade80";
    document.getElementById('status-txt').innerText = "en vivo";
    document.getElementById('last-update').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch (e) {
    dot.style.background = "#f87171";
  }
}

function renderPartidos(enc, nombres) {
  let html = '';
  ESTRUCTURA.forEach(seccion => {
    html += `<div class="section-label">${seccion.dia}</div>`;
    seccion.ids.forEach(id => {
      const p = enc[id]; if (!p) return;
      
      const nomL = nombres[p.l] || p.l;
      const nomV = nombres[p.v] || p.v;
      const esMio = nomL.includes('NBF') || nomV.includes('NBF');
      const esCambio = REFERENCIA[id] && p.hora !== REFERENCIA[id];

      html += `
        <div class="partido-card ${esMio ? 'mi-partido' : ''}">
          <div class="partido-hora ${esCambio ? 'hora-cambiada' : ''}">
            ${p.hora}
            <span class="pista-tag">${PISTAS[id] || 'Pista TBD'}</span>
          </div>
          <div>
            <div class="equipo ${nomL === MI_EQUIPO ? 'destacado' : ''}">${nomL}</div>
            <div class="equipo ${nomV === MI_EQUIPO ? 'destacado' : ''}">${nomV}</div>
          </div>
          <div class="resultado">${(p.resL && p.resV) ? p.resL + '-' + p.resV : 'vs'}</div>
        </div>`;
    });
  });
  document.getElementById('panel-partidos').innerHTML = html;
}

function renderClasificacion(enc) {
  const stats = {};
  Object.values(enc).filter(p => p.id >= 71 && p.id <= 80).forEach(p => {
    [p.l, p.v].forEach(eq => { if(!stats[eq]) stats[eq] = {pj:0, pg:0, pf:0, pc:0, pts:0}; });
    if(p.resL && p.resV) {
      const rl = parseInt(p.resL), rv = parseInt(p.resV);
      stats[p.l].pj++; stats[p.v].pj++; stats[p.l].pf += rl; stats[p.l].pc += rv; stats[p.v].pf += rv; stats[p.v].pc += rl;
      if(rl > rv) { stats[p.l].pg++; stats[p.l].pts += 2; stats[p.v].pts += 1; }
      else { stats[p.v].pg++; stats[p.v].pts += 2; stats[p.l].pts += 1; }
    }
  });
  const sorted = Object.entries(stats).sort((a,b) => b[1].pts - a[1].pts || (b[1].pf-b[1].pc) - (a[1].pf-a[1].pc));
  let html = `<div class="tabla-wrap"><table><thead><tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PTS</th><th>+/-</th></tr></thead><tbody>`;
  sorted.forEach(([nom, s]) => {
    html += `<tr class="${nom === MI_EQUIPO ? 'mi-fila' : ''}"><td>${nom}</td><td>${s.pj}</td><td>${s.pg}</td><td>${s.pts}</td><td>${s.pf-s.pc}</td></tr>`;
  });
  document.getElementById('panel-clasificacion').innerHTML = html + `</tbody></table></div>`;
}

cargar(); setInterval(cargar, 60000);
</script>
</body>
</html>
