<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Torneo Dashboard REAL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{background:#0b1020;color:white;font-family:sans-serif}
.tabs{display:flex;flex-wrap:wrap;gap:6px;padding:10px}
.tab{padding:6px 10px;background:#1a2235;cursor:pointer;border-radius:6px;font-size:12px}
.tab.active{background:#38bdf8;color:black}
.panel{display:none;padding:10px}
.panel.active{display:block}
.card{background:#111827;padding:10px;margin:6px;border-radius:8px}
</style>
</head>
<body>

<h3 style="padding:10px">TORNEO LIVE (REAL PARSER)</h3>
<div id="tabs"></div>
<div id="content"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1972783032";
const PROXY = "https://corsproxy.io/?";

let STRUCT = {};

function isCategory(row){
  const txt = row.join(" ");
  return txt.includes("PREMINI") ||
         txt.includes("MFA") ||
         txt.includes("MFB") ||
         txt.includes("MFC") ||
         txt.includes("MMB") ||
         txt.includes("PFA") ||
         txt.includes("PFC") ||
         txt.includes("ESC");
}

function isMatch(row){
  return row.some(c => (c||"").includes("vs")) ||
         row.some(c => (c||"").match(/\d{1,2}:\d{2}/));
}

function parse(data){

  STRUCT = {};
  let cat = "SIN_CATEGORIA";

  data.forEach(row => {

    const clean = row.map(c => (c||"").trim()).filter(Boolean);
    if(clean.length === 0) return;

    if(isCategory(clean)){
      cat = clean.join(" | ");
      STRUCT[cat] = STRUCT[cat] || [];
      return;
    }

    if(isMatch(clean)){
      STRUCT[cat] = STRUCT[cat] || [];
      STRUCT[cat].push({
        raw: clean
      });
    }
  });

  render();
}

function render(){

  const tabs = document.getElementById("tabs");
  const content = document.getElementById("content");

  tabs.innerHTML = "";
  content.innerHTML = "";

  Object.keys(STRUCT).forEach((cat,i)=>{

    const t = document.createElement("div");
    t.className = "tab" + (i===0?" active":"");
    t.innerText = cat;

    const panel = document.createElement("div");
    panel.className = "panel" + (i===0?" active":"");

    t.onclick = ()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      panel.classList.add("active");
    };

    STRUCT[cat].forEach(m=>{
      const d = document.createElement("div");
      d.className="card";
      d.innerHTML = `<pre>${JSON.stringify(m.raw,null,2)}</pre>`;
      panel.appendChild(d);
    });

    tabs.appendChild(t);
    content.appendChild(panel);
  });
}

async function load(){

  const res = await fetch(PROXY + encodeURIComponent(URL + "&t=" + Date.now()));
  const csv = await res.text();

  const parsed = Papa.parse(csv).data;

  parse(parsed);
}

load();
setInterval(load,60000);

</script>
</body>
</html>
