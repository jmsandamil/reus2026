<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DEBUG EXCEL LIVE</title>
<style>
body{background:#0a0f1e;color:white;font-family:monospace;padding:20px}
.block{border:1px solid #333;margin:6px 0;padding:8px;border-radius:6px}
.id{color:#38bdf8;font-weight:bold}
.meta{color:#fbbf24}
.team{color:#a5b4fc}
.score{color:#4ade80}
</style>
</head>
<body>

<h2>RAW GOOGLE SHEET DEBUG</h2>
<div id="out"></div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=470734480';
const PROXY = 'https://corsproxy.io/?';

async function load(){
  const r = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
  const csv = await r.text();

  const rows = csv.split('\n').map(r => r.split(',').map(c => c.replace(/"/g,'').trim()));

  let html = '';

  rows.forEach(row => {

    const col0 = row[0];

    // 🔥 PARTIDO (ID numérico)
    if(col0 && !isNaN(col0)){
      html += `
        <div class="block">
          <div class="id">PARTIDO #${col0}</div>
          <div class="team">${row[1] || ''} vs ${row[2] || ''}</div>
          <div class="score">resultado: ${row.slice(1,6).join(' | ')}</div>
        </div>
      `;
      return;
    }

    // 🔥 TEXTO / CATEGORÍA / FASE
    if(col0 && col0.trim() !== ''){
      html += `
        <div class="block meta">
          ${row.join(' | ')}
        </div>
      `;
      return;
    }

    // 🔥 FILA VACÍA
    html += `<div class="block" style="opacity:0.2">---</div>`;
  });

  document.getElementById('out').innerHTML = html;
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
