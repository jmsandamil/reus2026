<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1972783032';
const PROXY = 'https://corsproxy.io/?';

async function update() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
    const csv = await res.text();

    const rows = csv.split('\n').map(r =>
      r.split(',').map(c => c.trim().replace(/"/g, ''))
    );

    const matches = [];

    for (let i = 0; i < rows.length; i++) {
      for (let j = 0; j < rows[i].length; j++) {

        const cell = rows[i][j];

        // Detecta categoría (MFA, MFB, etc.)
        if (/^(MFA|MFB|MMB|MMA|PFA|PFC|PMC|ESC)/.test(cell)) {

          const categoria = cell;
          const eqL = rows[i][j+1];
          const eqV = rows[i][j+2];

          // Buscar resultado debajo
          let resL = null, resV = null;
          if (!isNaN(rows[i+1]?.[j+1]) && !isNaN(rows[i+1]?.[j+2])) {
            resL = rows[i+1][j+1];
            resV = rows[i+1][j+2];
          }

          // Buscar hora hacia arriba
          let hora = "--:--";
          for (let k = i; k >= 0; k--) {
            for (let c = 0; c < 5; c++) {
              if (rows[k][c]?.includes(':')) {
                hora = rows[k][c];
                break;
              }
            }
            if (hora !== "--:--") break;
          }

          // Buscar día
          let dia = "";
          for (let k = i; k >= 0; k--) {
            if (rows[k].join(" ").includes("viernes")) dia = "Viernes";
            if (rows[k].join(" ").includes("Sábado")) dia = "Sábado";
            if (rows[k].join(" ").includes("domingo")) dia = "Domingo";
          }

          if (eqL && eqV) {
            matches.push({
              categoria,
              eqL,
              eqV,
              resL,
              resV,
              hora,
              dia
            });
          }
        }
      }
    }

    render(matches);

  } catch (e) {
    console.error(e);
    document.getElementById('panel-partidos').innerHTML = "Error cargando datos";
  }
}

function render(matches) {

  // Agrupar por categoría
  const categorias = {};
  matches.forEach(m => {
    if (!categorias[m.categoria]) categorias[m.categoria] = [];
    categorias[m.categoria].push(m);
  });

  // Crear tabs dinámicos
  const tabsContainer = document.querySelector('.tabs');
  tabsContainer.innerHTML = '';

  const main = document.querySelector('main');
  main.innerHTML = '';

  let first = true;

  Object.keys(categorias).forEach(cat => {

    // TAB
    const btn = document.createElement('button');
    btn.className = 'tab ' + (first ? 'active' : '');
    btn.innerText = cat;
    btn.onclick = () => showTab(cat, btn);
    tabsContainer.appendChild(btn);

    // PANEL
    const panel = document.createElement('div');
    panel.id = 'panel-' + cat;
    panel.className = 'panel ' + (first ? 'active' : '');

    let html = '';
    let lastDia = '';

    categorias[cat].forEach(m => {

      if (m.dia !== lastDia) {
        lastDia = m.dia;
        html += `<div class="section-label">${m.dia}</div>`;
      }

      html += `
        <div class="match-card">
          <div>
            <span class="time-main">${m.hora}</span>
          </div>
          <div>
            <div class="team-name">${m.eqL}</div>
            <div class="team-name">${m.eqV}</div>
          </div>
          <div class="score-col">
            ${m.resL ?? '-'}
            <div class="score-divider"></div>
            ${m.resV ?? '-'}
          </div>
        </div>
      `;
    });

    panel.innerHTML = html;
    main.appendChild(panel);

    first = false;
  });

}

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

update();
setInterval(update, 60000);
</script>
