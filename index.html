<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBF Castelló · Reus 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0f1e; --surface: #111827; --accent: #38bdf8; --gold: #f0b429; --text: #f1f5f9; --muted: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; margin: 0; padding: 15px; }
        .header { max-width: 600px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        .status { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; }
        #dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #64748b; margin-right: 5px; }
        #dot.ok { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        #dot.error { background: #f87171; }
        .card { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 8px; max-width: 600px; margin-left: auto; margin-right: auto; display: grid; grid-template-columns: 50px 1fr 60px; align-items: center; }
        .mi-equipo { border-left: 4px solid var(--accent); background: rgba(56,189,248,0.05); }
        .hora { font-family: 'DM Mono', monospace; color: var(--gold); font-size: 13px; }
        .equipos { padding: 0 10px; overflow: hidden; }
        .nombre { font-size: 13px; margin: 2px 0; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nombre.bold { color: var(--text); font-weight: 700; }
        .resultado { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--accent); font-size: 16px; text-align: right; }
        .section { max-width: 600px; margin: 20px auto 10px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="font-size:20px;margin:0">NBF Castelló</h1>
        <div style="color:var(--muted); font-size:11px;">12 Hores Salle Reus</div>
    </div>
    <div class="status"><span id="dot"></span><span id="st-txt">Cargando</span></div>
</div>

<div id="partidos-lista"></div>

<script>
// Usamos el Proxy de Corsproxy.io que es más estable para móviles
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=470734480';
const PROXY = 'https://corsproxy.io/?';

const PARTIDOS = [
    { id: 71, dia: 'Viernes 1', hora: '12:00', l: 'STADIUM CASABLANCA A', v: 'NBF CASTELLÓ A' },
    { id: 72, dia: 'Viernes 1', hora: '15:00', l: 'U10F Sant Gregori', v: 'STADIUM CASABLANCA A' },
    { id: 77, dia: 'Sábado 2', hora: '09:00', l: 'NBF CASTELLÓ A', v: 'TGN' },
    { id: 73, dia: 'Sábado 2', hora: '10:00', l: 'STADIUM CASABLANCA A', v: 'ESCOLA PUIGCERVER' },
    { id: 76, dia: 'Sábado 2', hora: '12:00', l: 'ESCOLA PUIGCERVER', v: 'NBF CASTELLÓ A' },
    { id: 74, dia: 'Sábado 2', hora: '16:00', l: 'TGN', v: 'STADIUM CASABLANCA A' },
    { id: 75, dia: 'Sábado 2', hora: '17:00', l: 'NBF CASTELLÓ A', v: 'U10F Sant Gregori' },
    { id: 78, dia: 'Sábado 2', hora: '12:00', l: 'ESCOLA PUIGCERVER', v: 'U10F Sant Gregori' },
    { id: 79, dia: 'Sábado 2', hora: '17:00', l: 'U10F Sant Gregori', v: 'TGN' },
    { id: 80, dia: 'Sábado 2', hora: '20:00', l: 'TGN', v: 'ESCOLA PUIGCERVER' }
];

async function update() {
    try {
        // El proxy ayuda a saltar el bloqueo de Google desde el móvil
        const response = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
        if (!response.ok) throw new Error('Network response was not ok');
        
        const data = await response.text();
        const rows = data.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));
        
        const resultados = {};
        rows.forEach(row => {
            const id = parseInt(row[0]);
            if(id && !isNaN(id)) {
                // Buscamos si hay números en las columnas de la fila del partido
                const scores = row.slice(1, 6).filter(val => val !== "" && !isNaN(val));
                if (scores.length >= 2) {
                    resultados[id] = { l: scores[0], v: scores[1] };
                }
            }
        });

        render(resultados);
        document.getElementById('dot').className = 'ok';
        document.getElementById('st-txt').innerText = 'En vivo';
    } catch (e) {
        console.error(e);
        document.getElementById('dot').className = 'error';
        document.getElementById('st-txt').innerText = 'Error red';
    }
}

function render(res) {
    let html = '';
    let diaActual = '';
    PARTIDOS.forEach(p => {
        if(p.dia !== diaActual) {
            diaActual = p.dia;
            html += `<div class="section">${diaActual} Mayo</div>`;
        }
        const r = res[p.id];
        const nbfEsLocal = p.l.includes('NBF');
        const nbfEsVisit = p.v.includes('NBF');
        
        html += `
            <div class="card ${(nbfEsLocal || nbfEsVisit) ? 'mi-equipo' : ''}">
                <div class="hora">${p.hora}</div>
                <div class="equipos">
                    <div class="nombre ${nbfEsLocal ? 'bold' : ''}">${p.l}</div>
                    <div class="nombre ${nbfEsVisit ? 'bold' : ''}">${p.v}</div>
                </div>
                <div class="resultado">${r ? r.l + ' - ' + r.v : 'vs'}</div>
            </div>`;
    });
    document.getElementById('partidos-lista').innerHTML = html;
}

update();
// Actualiza cada 45 segundos para no saturar el móvil
setInterval(update, 45000);
</script>
</body>
</html>
