<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Hores Salle Reus 2026 · NBF Castelló</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent-nbf: #38bdf8;
    --accent-castello: #f472b6;
    --gold: #f0b429;
    --text: #f1f5f9;
    --muted: #64748b;
    --green: #4ade80;
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 0 0 4rem; }
  header { border-bottom: 1px solid var(--border); padding: 2rem 1.5rem 0; max-width: 900px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .torneo-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 800; line-height: 1.1; margin: 0.5rem 0; }
  h1 .nbf { color: var(--accent-nbf); }
  h1 .castello { color: var(--accent-castello); }
  .refresh-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }
  #status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 5px; }
  #status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
  #status-dot.error { background: var(--red); }
  
  .tabs { display: flex; margin-top: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'DM Mono', monospace; font-size: 11px; padding: 0.8rem 1.5rem; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent; text-transform: uppercase; transition: 0.3s; }
  .tab.active { color: var(--accent-nbf); border-bottom-color: var(--accent-nbf); }

  main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin: 2rem 0 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .partido-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-bottom: 10px; display: grid; grid-template-columns: 80px 1fr auto; align-items: center; gap: 1rem; }
  .mi-partido { border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.04); }
  .partido-hora { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--gold); font-weight: 500; }
  .partido-hora small { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .equipo { font-size: 15px; font-weight: 600; color: #94a3b8; line-height: 1.4; }
  .equipo.destacado { color: var(--text); }
  .resultado-box { text-align: right; min-width: 60px; }
  .resultado { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent-nbf); font-weight: 700; }
  .pendiente { font-size: 10px; color: var(--muted); font-weight: normal; text-transform: uppercase; }

  .tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 13px; }
  th { background: var(--surface2); padding: 12px; text-align: left; color: var(--muted); font-size: 10px; text-transform: uppercase; }
  td { padding: 14px 12px; border-bottom: 1px solid var(--border); }
  .mi-fila { background: rgba(56,189,248,0.08); color: var(--accent-nbf); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="torneo-label">12 Hores Salle Reus 2026</div>
      <h1><span class="nbf">NBF</span> <span class="castello">Castelló</span></h1>
    </div>
    <div class="refresh-info">
      <div><span id="status-dot"></span><span id="status-txt">Iniciando...</span></div>
      <div id="last-update" style="margin-top:4px; opacity:0.5;">--:--</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="tab(event, 'partidos')">Partidos</button>
    <button class="tab" onclick="tab(event, 'clasifica')">Clasificación</button>
  </div>
</header>

<main>
  <div id="partidos" class="panel active">Cargando partidos...</div>
  <div id="clasifica" class="panel">Cargando clasificación...</div>
</main>

<script>
const CONFIG = {
  sheetId: '1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s',
  gid: '470734480', // Pestaña de Resultados/Calendario
  miEquipo: 'NBF CASTELLÓ A'
};

const CALENDARIO = [
  { id: 71, dia: 'Viernes 1', hora: '12:00', local: 'STADIUM CASABLANCA A', visit: 'NBF CASTELLÓ A' },
  { id: 72, dia: 'Viernes 1', hora: '15:00', local: 'U10F Sant Gregori', visit: 'STADIUM CASABLANCA A' },
  { id: 77, dia: 'Sábado 2', hora: '09:00', local: 'NBF CASTELLÓ A', visit: 'TGN' },
  { id: 73, dia: 'Sábado 2', hora: '10:00', local: 'STADIUM CASABLANCA A', visit: 'ESCOLA PUIGCERVER' },
  { id: 76, dia: 'Sábado 2', hora: '12:00', local: 'ESCOLA PUIGCERVER', visit: 'NBF CASTELLÓ A' },
  { id: 74, dia: 'Sábado 2', hora: '16:00', local: 'TGN', visit: 'STADIUM CASABLANCA A' },
  { id: 75, dia: 'Sábado 2', hora: '17:00', local: 'NBF CASTELLÓ A', visit: 'U10F Sant Gregori' },
  { id: 78, dia: 'Sábado 2', hora: '12:00', local: 'ESCOLA PUIGCERVER', visit: 'U10F Sant Gregori' },
  { id: 79, dia: 'Sábado 2', hora: '17:00', local: 'U10F Sant Gregori', visit: 'TGN' },
  { id: 80, dia: 'Sábado 2', hora: '20:00', local: 'TGN', visit: 'ESCOLA PUIGCERVER' }
];

function tab(e, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.getElementById(id).classList.add('active');
}

async function getData() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  
  try {
    // Usamos un proxy para evitar el error de CORS en GitHub Pages
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/export?format=csv&gid=${CONFIG.gid}`;
    const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    if (!response.ok) throw new Error();
    
    const csv = await response.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));
    
    // 1. Extraer resultados (asumiendo que el ID del partido está en la columna A)
    const resultados = {};
    rows.forEach(row => {
      const id = parseInt(row[0]);
      if (!isNaN(id)) {
        // Buscamos valores numéricos en las columnas B y C (ajustar si la hoja cambia)
        const s1 = row[1], s2 = row[2];
        if (s1 !== "" && s2 !== "" && !isNaN(s1) && !isNaN(s2)) {
          resultados[id] = { l: s1, v: s2 };
        }
      }
    });

    render(resultados);
    
    dot.className = 'ok';
    txt.textContent = 'En vivo';
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch (err) {
    dot.className = 'error';
    txt.textContent = 'Error de conexión';
    console.error(err);
  }
}

function render(res) {
  // Render Partidos
  let htmlP = '';
  let currentDia = '';
  
  CALENDARIO.forEach(p => {
    if (p.dia !== currentDia) {
      currentDia = p.dia;
      htmlP += `<div class="section-label">${currentDia} de Mayo</div>`;
    }
    
    const r = res[p.id];
    const esMio = p.local === CONFIG.miEquipo || p.visit === CONFIG.miEquipo;
    
    htmlP += `
      <div class="partido-card ${esMio ? 'mi-partido' : ''}">
        <div class="partido-hora">${p.hora}<small>#${p.id}</small></div>
        <div>
          <div class="equipo ${p.local === CONFIG.miEquipo ? 'destacado' : ''}">${p.local}</div>
          <div class="equipo ${p.visit === CONFIG.miEquipo ? 'destacado' : ''}">${p.visit}</div>
        </div>
        <div class="resultado-box">
          <div class="resultado ${!r ? 'pendiente' : ''}">${r ? r.l + ' - ' + r.v : 'vs'}</div>
        </div>
      </div>`;
  });
  document.getElementById('partidos').innerHTML = htmlP;

  // Render Clasificación (Lógica básica)
  const stats = {};
  const equipos = [...new Set(CALENDARIO.flatMap(p => [p.local, p.visit]))];
  equipos.forEach(e => stats[e] = { pj:0, pg:0, pp:0, pts:0 });

  Object.keys(res).forEach(id => {
    const p = CALENDARIO.find(c => c.id == id);
    if (p) {
      const r = res[id];
      stats[p.local].pj++; stats[p.visit].pj++;
      if (parseInt(r.l) > parseInt(r.v)) {
        stats[p.local].pg++; stats[p.local].pts += 2;
        stats[p.visit].pp++; stats[p.visit].pts += 1;
      } else {
        stats[p.visit].pg++; stats[p.visit].pts += 2;
        stats[p.local].pp++; stats[p.local].pts += 1;
      }
    }
  });

  const ranking = Object.entries(stats).sort((a,b) => b[1].pts - a[1].pts);
  let htmlC = `<div class="tabla-wrap"><table>
    <tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PP</th><th>PTS</th></tr>`;
  ranking.forEach(([name, s]) => {
    htmlC += `<tr class="${name === CONFIG.miEquipo ? 'mi-fila' : ''}">
      <td>${name}</td><td>${s.pj}</td><td>${s.pg}</td><td>${s.pp}</td><td><b>${s.pts}</b></td>
    </tr>`;
  });
  htmlC += `</table></div>`;
  document.getElementById('clasifica').innerHTML = htmlC;
}

// Actualizar cada 60 segundos
getData();
setInterval(getData, 60000);
</script>
</body>
</html>
