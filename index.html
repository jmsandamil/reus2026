<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Castelló · Partidos</title>

<style>
:root{
  --bg:#0a0f1e;
  --surface:#111827;
  --border:rgba(255,255,255,0.07);
  --text:#f1f5f9;
  --muted:#64748b;
  --accent:#38bdf8;
  --gold:#f0b429;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
  padding:16px;
}

h1{color:var(--accent)}

.section{
  margin-top:10px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:grid;
  grid-template-columns:80px 1fr auto;
  gap:10px;
}

.hora{
  color:var(--gold);
  font-weight:bold;
}

.pista{
  font-size:10px;
  color:var(--muted);
}

.resultado{
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th{
  padding:8px;
  border-bottom:1px solid var(--border);
}

th{color:var(--muted)}
</style>
</head>

<body>

<h1>NBF Castelló</h1>

<div id="status">Cargando...</div>

<h2>Partidos</h2>
<div id="partidos"></div>

<h2>Clasificación</h2>
<div id="clasificacion"></div>


<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1972783032";

const PROXY = "https://corsproxy.io/?";

const IDS = new Set(["71","72","73","74","75","76","77","78","79","80","81","82","83"]);


// ================= LOAD =================
async function load(){
  try{

    const res = await fetch(PROXY + encodeURIComponent(SHEET_URL));
    const csv = await res.text();

    const rows = csv.split("\n").map(r =>
      r.split(",").map(c => c.trim().replace(/"/g,""))
    );

    const partidos = parse(rows);

    render(partidos);

    setStatus("EN VIVO");

  }catch(e){
    console.error(e);
    setStatus("ERROR");
  }
}


// ================= PARSER =================
function parse(rows){

  const partidos = [];

  const isTeam = v =>
    v &&
    isNaN(v) &&
    v.length > 2 &&
    !v.includes("PFA") &&
    !v.includes("CLASS");

  const findHora = (f)=>{
    for(let i=f;i>=0;i--){
      for(let c=0;c<rows[i].length;c++){
        if(rows[i][c] && rows[i][c].match(/\d{1,2}:\d{2}/))
          return rows[i][c];
      }
    }
    return "--:--";
  };

  const findPista = (f,c)=>{
    for(let i=f;i>=0;i--){
      if(rows[i][c] && rows[i][c].includes("P"))
        return rows[i][c];
    }
    return "P?";
  };


  for(let f=0;f<rows.length;f++){
    for(let c=0;c<rows[f].length;c++){

      const v = (rows[f][c]||"").trim();

      if(!IDS.has(v)) continue;

      let teams = [];

      for(let i=-2;i<=2;i++){
        const r = rows[f+i];
        if(!r) continue;

        r.forEach(x=>{
          if(isTeam(x)) teams.push(x);
        });
      }

      if(teams.length<2) continue;

      const hora = findHora(f);
      const pista = findPista(f,c);

      const resL = rows[f]?.[c+1] || "";
      const resV = rows[f]?.[c+2] || "";

      partidos.push({
        id:v,
        hora,
        pista,
        l:teams[0],
        v:teams[1],
        resL,
        resV
      });
    }
  }

  return partidos;
}


// ================= RENDER =================
function render(partidos){

  let html = "";

  partidos.forEach(p=>{

    html += `
    <div class="card">
      <div>
        <div class="hora">${p.hora}</div>
        <div class="pista">${p.pista}</div>
      </div>

      <div>
        <div>${p.l}</div>
        <div>${p.v}</div>
      </div>

      <div class="resultado">
        ${p.resL && p.resV ? p.resL+"-"+p.resV : "vs"}
      </div>
    </div>`;
  });

  document.getElementById("partidos").innerHTML = html;

  clasificacion(partidos);
}


// ================= CLASIFICACIÓN =================
function clasificacion(partidos){

  const stats={};

  partidos.forEach(p=>{

    if(!stats[p.l]) stats[p.l]={pj:0,pg:0,pts:0,pf:0,pc:0};
    if(!stats[p.v]) stats[p.v]={pj:0,pg:0,pts:0,pf:0,pc:0};

    if(p.resL && p.resV){

      const a=parseInt(p.resL);
      const b=parseInt(p.resV);

      stats[p.l].pj++;
      stats[p.v].pj++;

      stats[p.l].pf+=a;
      stats[p.l].pc+=b;

      stats[p.v].pf+=b;
      stats[p.v].pc+=a;

      if(a>b){
        stats[p.l].pg++; stats[p.l].pts+=2;
        stats[p.v].pts+=1;
      }else{
        stats[p.v].pg++; stats[p.v].pts+=2;
        stats[p.l].pts+=1;
      }
    }
  });

  let html=`<table>
  <tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PTS</th><th>+/-</th></tr>`;

  Object.entries(stats).forEach(([k,v])=>{
    html+=`<tr>
      <td>${k}</td>
      <td>${v.pj}</td>
      <td>${v.pg}</td>
      <td>${v.pts}</td>
      <td>${v.pf-v.pc}</td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("clasificacion").innerHTML=html;
}


// ================= STATUS =================
function setStatus(t){
  document.getElementById("status").innerText=t;
}


// START
load();
setInterval(load,60000);

</script>

</body>
</html>
