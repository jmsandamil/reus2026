<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Hores Salle Reus 2026</title>

<style>
body { background:#0a0f1e; color:#fff; font-family:sans-serif; margin:0; }
header { padding:20px; border-bottom:1px solid #222; }
h1 { margin:0; }

.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.tab { padding:6px 12px; background:#111; cursor:pointer; border-radius:6px; font-size:12px; }
.tab.active { background:#38bdf8; color:#000; }

.panel { display:none; padding:20px; }
.panel.active { display:block; }

.card { background:#111827; margin-bottom:8px; padding:10px; border-radius:8px; display:flex; justify-content:space-between; }
.clasif table { width:100%; border-collapse:collapse; font-size:12px; }
.clasif td, .clasif th { padding:6px; border-bottom:1px solid #222; }
</style>
</head>

<body>

<header>
<h1>12 Hores Salle Reus 2026</h1>
<div id="tabs" class="tabs"></div>
</header>

<div id="contenido"></div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=470734480';
const PROXY = 'https://corsproxy.io/?';

let DATA = {};

function showTab(cat, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+cat).classList.add('active');
}

async function cargar(){
  const res = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
  const csv = await res.text();

  const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));

  parsear(rows);
  render();
}

function parsear(rows){
  let categoriaActual = null;

  rows.forEach(row => {

    // detectar categoría
    if(row[0] && row[0].includes('PREMINI') || row[0].includes('MINI') || row[0].includes('CADETE')){
      categoriaActual = row[0];
      if(!DATA[categoriaActual]){
        DATA[categoriaActual] = { partidos: [], resultados: {} };
      }
    }

    // detectar partidos (id numérico)
    const id = parseInt(row[0]);
    if(!isNaN(id)){
      const eq1 = row[1];
      const eq2 = row[2];

      if(eq1 && eq2){
        DATA[categoriaActual].partidos.push({
          id,
          local:eq1,
          visitante:eq2
        });
      }

      const nums = row.slice(1,6).filter(x=>!isNaN(x) && x!=='');
      if(nums.length>=2){
        DATA[categoriaActual].resultados[id] = {
          l: parseInt(nums[0]),
          v: parseInt(nums[1])
        }
      }
    }
  });
}

function render(){
  const tabs = document.getElementById('tabs');
  const cont = document.getElementById('contenido');

  tabs.innerHTML = '';
  cont.innerHTML = '';

  Object.keys(DATA).forEach((cat,i)=>{
    tabs.innerHTML += `<div class="tab ${i==0?'active':''}" onclick="showTab('${cat}',this)">${cat}</div>`;

    const panel = document.createElement('div');
    panel.className = 'panel '+(i==0?'active':'');
    panel.id = 'panel-'+cat;

    panel.innerHTML = renderCategoria(cat);

    cont.appendChild(panel);
  });
}

function renderCategoria(cat){
  const data = DATA[cat];

  let html = `<h2>Partidos</h2>`;

  data.partidos.forEach(p=>{
    const r = data.resultados[p.id];

    html += `
      <div class="card">
        <div>${p.local} vs ${p.visitante}</div>
        <div>${r ? r.l+'-'+r.v : 'vs'}</div>
      </div>
    `;
  });

  html += `<h2>Clasificación</h2>`;
  html += clasificacion(data);

  return html;
}

function clasificacion(data){
  const stats = {};

  data.partidos.forEach(p=>{
    stats[p.local] = stats[p.local] || {pj:0,pg:0,pts:0,dif:0};
    stats[p.visitante] = stats[p.visitante] || {pj:0,pg:0,pts:0,dif:0};

    const r = data.resultados[p.id];
    if(r){
      stats[p.local].pj++;
      stats[p.visitante].pj++;

      stats[p.local].dif += r.l - r.v;
      stats[p.visitante].dif += r.v - r.l;

      if(r.l > r.v){
        stats[p.local].pg++; stats[p.local].pts+=2;
        stats[p.visitante].pts+=1;
      } else {
        stats[p.visitante].pg++; stats[p.visitante].pts+=2;
        stats[p.local].pts+=1;
      }
    }
  });

  const orden = Object.entries(stats).sort((a,b)=>b[1].pts - a[1].pts || b[1].dif - a[1].dif);

  let html = `<div class="clasif"><table>
  <tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PTS</th><th>+/-</th></tr>`;

  orden.forEach(([e,s])=>{
    html += `<tr><td>${e}</td><td>${s.pj}</td><td>${s.pg}</td><td>${s.pts}</td><td>${s.dif}</td></tr>`;
  });

  html += `</table></div>`;
  return html;
}

// refresco automático
cargar();
setInterval(()=>{
  DATA = {};
  cargar();
}, 60000);

</script>

</body>
</html>
