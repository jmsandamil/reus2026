<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Torneo Live</title>

<style>
body{background:#0b1020;color:white;font-family:sans-serif;margin:0}
.tabs{display:flex;flex-wrap:wrap;gap:6px;padding:10px;border-bottom:1px solid #222}
.tab{padding:6px 10px;background:#1a2235;cursor:pointer;border-radius:6px;font-size:12px}
.tab.active{background:#38bdf8;color:black}
.panel{display:none;padding:10px}
.panel.active{display:block}
.card{background:#111827;padding:10px;margin:6px;border-radius:8px}
.small{color:#aaa;font-size:11px}
</style>
</head>

<body>

<h3 style="padding:10px">🏀 Torneo Live Dashboard</h3>

<div id="tabs"></div>
<div id="content"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/gviz/tq?tqx=out:html&gid=1972783032";

let DATA = {};

async function load(){

  const res = await fetch(URL);
  const html = await res.text();

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  const rows = [...doc.querySelectorAll("tr")].map(tr =>
    [...tr.querySelectorAll("td,th")].map(td => td.innerText.trim())
  );

  parse(rows);
}

function isCategory(row){
  const txt = row.join(" ");
  return txt.includes("PREMINI") ||
         txt.includes("MFA") ||
         txt.includes("MFB") ||
         txt.includes("MFC") ||
         txt.includes("MMB") ||
         txt.includes("PFA") ||
         txt.includes("PFC") ||
         txt.includes("ESC");
}

function isMatch(row){
  return row.some(c => c.includes("vs")) || row.some(c => /\d{1,2}:\d{2}/.test(c));
}

function parse(rows){

  DATA = {};
  let cat = "SIN_CATEGORIA";

  rows.forEach(r => {

    if(!r || r.length === 0) return;

    if(isCategory(r)){
      cat = r.join(" ");
      DATA[cat] = DATA[cat] || [];
      return;
    }

    if(isMatch(r)){
      DATA[cat] = DATA[cat] || [];
      DATA[cat].push(r);
    }
  });

  render();
}

function render(){

  const tabs = document.getElementById("tabs");
  const content = document.getElementById("content");

  tabs.innerHTML = "";
  content.innerHTML = "";

  Object.keys(DATA).forEach((cat,i)=>{

    const tab = document.createElement("div");
    tab.className = "tab" + (i===0?" active":"");
    tab.innerText = cat;

    const panel = document.createElement("div");
    panel.className = "panel" + (i===0?" active":"");

    tab.onclick = ()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      tab.classList.add("active");
      panel.classList.add("active");
    };

    DATA[cat].forEach(m=>{
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div>${m.join(" | ")}</div>
      `;
      panel.appendChild(div);
    });

    tabs.appendChild(tab);
    content.appendChild(panel);
  });
}

load();
setInterval(load, 60000);

</script>

</body>
</html>
