<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo · App Live</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:Syne}
header{padding:20px;border-bottom:1px solid #222}
.tabs{display:flex;gap:10px;flex-wrap:wrap;padding:10px}
.tab{padding:6px 10px;background:#1a2235;border:1px solid #333;cursor:pointer;font-size:12px}
.tab.active{background:#38bdf8;color:#000;font-weight:700}
.panel{display:none;padding:15px}
.panel.active{display:block}

.card{background:#111827;padding:10px;margin:6px 0;border:1px solid #222;border-radius:8px}
.small{font-size:11px;color:#aaa;font-family:DM Mono}
.result{color:#38bdf8;font-family:DM Mono}
h3{margin:10px 0;color:#f0b429}
table{width:100%;font-size:12px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #222}
</style>
</head>

<body>

<header>
  <h2>Torneo Live Dashboard</h2>
  <div id="status">cargando...</div>
</header>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<script>
const PROXY = "https://corsproxy.io/?";

/*
📌 AQUÍ ES DONDE SE ARREGLA TODO:
Cada categoría = un gid del Excel
👉 Tienes que añadirlos todos
*/
const SHEETS = [
  { name:"PREMINI FEM A", gid:"1972783032" },
  { name:"PREMINI FEM B", gid:"0" } // ejemplo si existe
];

async function fetchSheet(gid){
  const url = `https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=${gid}`;
  const res = await fetch(PROXY + encodeURIComponent(url));
  const text = await res.text();

  return parseCSV(text);
}

function parseCSV(csv){
  return csv.split("\n").map((r,fila)=>
    r.split(",").map((c,columna)=>({
      fila,columna,
      valor:c.trim().replace(/"/g,'')
    }))
  );
}

function extractMatches(rows){
  let matches = [];

  rows.forEach(r=>{
    const id = parseInt(r[0]?.valor);

    if(!isNaN(id)){
      const l = r[1]?.valor;
      const v = r[2]?.valor;
      const r1 = r[5]?.valor;
      const r2 = r[6]?.valor;

      matches.push({
        id,
        local:l,
        visitante:v,
        resultado:(r1 && r2)?`${r1}-${r2}`:null
      });
    }
  });

  return matches;
}

async function load(){
  document.getElementById("status").innerText="cargando...";

  const tabs = document.getElementById("tabs");
  const panels = document.getElementById("panels");

  tabs.innerHTML="";
  panels.innerHTML="";

  for(let sheet of SHEETS){

    const rows = await fetchSheet(sheet.gid);
    const matches = extractMatches(rows);

    // TAB
    const btn = document.createElement("button");
    btn.className="tab";
    btn.innerText=sheet.name;
    btn.onclick=()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      panel.classList.add("active");
    };

    tabs.appendChild(btn);

    // PANEL
    const panel = document.createElement("div");
    panel.className="panel";

    let html = `<h3>${sheet.name}</h3>`;

    matches.forEach(m=>{
      html += `
        <div class="card">
          <div class="small">Partido #${m.id}</div>
          <div>${m.local} vs ${m.visitante}</div>
          <div class="result">${m.resultado || "vs"}</div>
        </div>
      `;
    });

    panel.innerHTML = html;
    panels.appendChild(panel);
  }

  // activar primero
  document.querySelector(".tab")?.click();

  document.getElementById("status").innerText="actualizado ✔";
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
