<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=470734480';
const PROXY = 'https://corsproxy.io/?';

async function exportarJSON() {
  try {
    const response = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
    const csv = await response.text();

    const rows = csv.split('\n').map((linea, fila) => {
      return linea.split(',').map((celda, columna) => ({
        fila,
        columna,
        valor: celda.trim().replace(/"/g, '')
      }));
    });

    console.log("JSON COMPLETO DEL EXCEL:");
    console.log(rows);

    document.body.innerHTML = `
      <pre style="white-space:pre-wrap;color:white;background:#111;padding:20px;font-size:12px">
${JSON.stringify(rows, null, 2)}
      </pre>
    `;

  } catch (error) {
    console.error(error);
  }
}

exportarJSON();
</script>
