<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Castelló · Monitor Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --surface: #111827; --border: rgba(255,255,255,0.08);
    --accent: #38bdf8; --gold: #f0b429; --text: #f1f5f9; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding-bottom: 5rem; }
  header { padding: 1.5rem; max-width: 850px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .debug-coord { color: #f87171; font-family: 'DM Mono'; font-size: 8px; margin-left: 4px; opacity: 0.8; }
  
  .tabs { display: flex; max-width: 850px; margin: 0 auto; padding: 0 1.5rem; gap: 20px; border-bottom: 1px solid var(--border); }
  .tab { background: none; border: none; color: var(--muted); font-family: 'DM Mono'; padding: 12px 0; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; font-size: 11px; font-weight: 600; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { max-width: 850px; margin: 0 auto; padding: 1rem 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-label { font-family: 'DM Mono'; font-size: 10px; color: var(--muted); text-transform: uppercase; margin: 2rem 0 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 10px; display: grid; grid-template-columns: 165px 1fr auto; align-items: center; gap: 1rem; }
  .mi-partido { border-left: 4px solid var(--accent); background: linear-gradient(90deg, rgba(56,189,248,0.05), transparent); }
  .time-main { font-family: 'DM Mono'; font-size: 16px; color: var(--gold); display: block; }
  .pista-sub { font-family: 'DM Mono'; font-size: 8px; color: var(--muted); text-transform: uppercase; margin-top: 4px; line-height: 1.3; font-weight: 500; }
  .team-name { font-weight: 700; font-size: 13px; color: #94a3b8; line-height: 1.4; }
  .team-name.nbf { color: var(--accent); }
  .score-col { font-family: 'DM Mono'; font-size: 15px; font-weight: 800; text-align: right; border-left: 1px solid var(--border); padding-left: 10px; min-width: 60px; }
</style>
</head>
<body>

<header>
  <h1 style="font-size:1.5rem; color:var(--accent)">NBF <span>Castelló</span></h1>
  <div id="clock" style="font-family:'DM Mono'; font-size:12px; color:var(--gold)">--:--</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('partidos', this)">Calendario</button>
  <button class="tab" onclick="showTab('clasificacion', this)">Clasificación</button>
</div>

<main>
  <div id="panel-partidos" class="panel active">Cargando...</div>
  <div id="panel-clasificacion" class="panel">
    <div id="clasi-table-container"></div>
  </div>
</main>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1536149592';
const PROXY = 'https://corsproxy.io/?';
const IDS = [71, 72, 73, 74, 75, 76, 77, 78, 79, 80, 81, 82, 83];

const PISTAS_OK = [
  "CN REUS PLOMS 1", "CN REUS PLOMS 2", "CN REUS PLOMS 3", "PLOMS 4", "PLOMS 5", 
  "PLOMS (EXT) ESCOLA", "EXTERIOR", "ESCOLA LA SALLE REUS", 
  "CIUTAT DE REUS - BARRI GAUDÍ 1", "CIUTAT DE REUS - BARRI GAUDÍ 2", 
  "ALBERICH I CASAS 1", "ALBERICH I CASAS 2"
];

async function update() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
    const csv = await res.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));
    
    let matches = [];
    IDS.forEach(id => {
      for (let f = 0; f < rows.length; f++) {
        const c = rows[f].indexOf(id.toString());
        if (c !== -1) {
          // DETERMINAR FILA DE CABECERA SEGÚN EL DÍA
          let filaCabecera = f < 28 ? 2 : (f < 55 ? 28 : 55);
          
          // 1. HORA
          let hora = "--:--"; let hC = "";
          for (let fb = f; fb >= 0; fb--) {
            for(let cb = 0; cb < 5; cb++) {
              if (rows[fb][cb]?.includes(':')) { hora = rows[fb][cb]; hC = `(${fb}:${cb})`; break; }
            }
            if (hC) break;
          }

          // 2. PISTA (BUSQUEDA EN LA CABECERA DEL DÍA)
          let pista = "Pista TBD"; let pC = "";
          // Buscamos desde la columna del partido hacia la izquierda en la fila de cabecera
          for (let cb = c; cb >= 0; cb--) {
            const celda = rows[filaCabecera][cb]?.toUpperCase() || "";
            const encontrada = PISTAS_OK.find(p => celda.includes(p.toUpperCase()));
            if (encontrada) {
              pista = encontrada; pC = `(${filaCabecera}:${cb})`; break;
            }
          }

          matches.push({
            id, f, dia: f < 28 ? "Viernes 1 Mayo" : (f < 55 ? "Sábado 2 Mayo" : "Domingo 3 Mayo"),
            hora, hC, pista, pC,
            eqL: rows[f-1][c+1], cL: `(${f-1}:${c+1})`,
            eqV: rows[f-1][c+2], cV: `(${f-1}:${c+2})`,
            resL: rows[f][c+1], crL: `(${f}:${c+1})`,
            resV: rows[f][c+2], crV: `(${f}:${c+2})`
          });
          break;
        }
      }
    });

    render(matches);
  } catch (e) { console.error(e); }
}

function render(matches) {
  let hMatch = ''; let lastD = '';
  matches.sort((a,b) => a.f - b.f).forEach(m => {
    if (m.dia !== lastD) { lastD = m.dia; hMatch += `<div class="section-label">${m.dia}</div>`; }
    const isNBF = m.eqL?.toUpperCase().includes('NBF') || m.eqV?.toUpperCase().includes('NBF');
    hMatch += `
      <div class="match-card ${isNBF ? 'mi-partido' : ''}">
        <div>
          <span class="time-main">${m.hora}<span class="debug-coord">${m.hC}</span></span>
          <span class="pista-sub">${m.pista}<span class="debug-coord">${m.pC}</span></span>
        </div>
        <div>
          <div class="team-name ${m.eqL?.toUpperCase().includes('NBF')?'nbf':''}">${m.eqL}</div>
          <div class="team-name ${m.eqV?.toUpperCase().includes('NBF')?'nbf':''}">${m.eqV}</div>
        </div>
        <div class="score-col">${m.resL || '-'}<br>${m.resV || '-'}</div>
      </div>`;
  });
  document.getElementById('panel-partidos').innerHTML = hMatch;
  renderClasi(matches);
  document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function renderClasi(matches) {
  const s = {};
  matches.filter(m => m.id <= 80).forEach(m => {
    [m.eqL, m.eqV].forEach(t => { if(t && t !== "TBD" && !s[t]) s[t] = {pj:0, pts:0, dif:0}; });
    const rL = parseInt(m.resL), rV = parseInt(m.resV);
    if(!isNaN(rL) && !isNaN(rV)) {
      s[m.eqL].pj++; s[m.eqV].pj++;
      s[m.eqL].dif += (rL - rV); s[m.eqV].dif += (rV - rL);
      if(rL > rV) { s[m.eqL].pts += 2; s[m.eqV].pts += 1; } 
      else if(rV > rL) { s[m.eqV].pts += 2; s[m.eqL].pts += 1; }
    }
  });
  const sorted = Object.entries(s).sort((a,b) => b[1].pts - a[1].pts || b[1].dif - a[1].dif);
  let h = `<table style="width:100%; border-collapse:collapse; font-family:'DM Mono'; font-size:12px"><tr><th style="text-align:left; padding:10px; color:var(--muted)">EQUIPO</th><th style="text-align:center">PJ</th><th style="text-align:center">PTS</th><th style="text-align:center">+/-</th></tr>`;
  sorted.forEach(([name, data]) => {
    h += `<tr style="border-bottom:1px solid var(--border); ${name.toUpperCase().includes('NBF')?'color:var(--accent);background:rgba(56,189,248,0.05)':''}">
      <td style="padding:12px 10px"><strong>${name}</strong></td><td style="text-align:center">${data.pj}</td><td style="text-align:center">${data.pts}</td><td style="text-align:center">${data.dif}</td></tr>`;
  });
  document.getElementById('clasi-table-container').innerHTML = h + `</table>`;
}

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

update();
setInterval(update, 60000);
</script>
</body>
</html>
