<script>
const PROXY = "https://corsproxy.io/?";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv";

let TORNEO = {};

async function load(){
  const res = await fetch(PROXY + encodeURIComponent(SHEET_URL));
  const csv = await res.text();

  const lines = csv.split("\n").map(l => l.split(",").map(c => c.trim().replace(/"/g,'')));

  parseTorneo(lines);
  render();
}

function parseTorneo(rows){

  let categoriaActual = "SIN_CATEGORIA";
  TORNEO = {};

  for(let i=0;i<rows.length;i++){
    const r = rows[i];
    const c0 = r[0];

    // 👉 detectar nueva categoría
    if(c0 && c0.includes("PREMINI")){
      categoriaActual = c0;
      if(!TORNEO[categoriaActual]){
        TORNEO[categoriaActual] = {
          partidos: [],
          clasificacion: []
        };
      }
      continue;
    }

    if(!TORNEO[categoriaActual]) continue;

    // 👉 detectar partido (#ID en columna)
    const id = parseInt(r[0]);

    if(!isNaN(id)){
      const local = r[1];
      const visitante = r[2];

      if(local && visitante){
        TORNEO[categoriaActual].partidos.push({
          id,
          local,
          visitante,
          resultado: (r[5] && r[6]) ? `${r[5]}-${r[6]}` : null
        });
      }
    }

    // 👉 clasificación
    if(c0 === "PFA" && r[1]){
      TORNEO[categoriaActual].clasificacion.push({
        equipo: r[1],
        pos: r[2]
      });
    }
  }
}

function render(){
  let html = "";

  for(const cat in TORNEO){

    html += `<h2 style="color:#38bdf8;margin-top:20px">${cat}</h2>`;

    html += `<h3>Partidos</h3>`;

    TORNEO[cat].partidos.forEach(p=>{
      html += `
        <div style="padding:8px;border:1px solid #222;margin:5px">
          #${p.id} ${p.local} vs ${p.visitante}
          <b style="color:#38bdf8">${p.resultado || "vs"}</b>
        </div>
      `;
    });

    html += `<h3>Clasificación</h3>`;

    TORNEO[cat].clasificacion.forEach(c=>{
      html += `<div>${c.pos} - ${c.equipo}</div>`;
    });

  }

  document.body.innerHTML = html;
}

load();
setInterval(load, 60000);
</script>
