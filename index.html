<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBF Debug Mode</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0f1e; --surface: #111827; --border: rgba(255,255,255,0.08); --accent: #38bdf8; --gold: #f0b429; --text: #f1f5f9; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 2rem; }
  .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-bottom: 15px; display: grid; grid-template-columns: 120px 1fr 100px; gap: 1rem; align-items: center; }
  .debug-info { color: #f87171; font-family: 'DM Mono'; font-size: 9px; font-weight: 400; margin-left: 4px; }
  .time-main { color: var(--gold); font-family: 'DM Mono'; font-size: 16px; }
  .team-name { font-weight: 700; margin-bottom: 4px; }
  .score-col { font-family: 'DM Mono'; font-size: 18px; text-align: right; }
  .section-label { color: var(--accent); font-family: 'DM Mono'; margin: 2rem 0 1rem; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
</style>
</head>
<body>

<h2 style="color:var(--accent)">NBF Debugger <small style="font-size:10px; color:white">Coord: (Fila : Columna)</small></h2>
<div id="log">Cargando y mapeando celdas...</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-7-itxOJfk1j4tDo2makpELp_qVICN6SzmeRTZKxu0s/export?format=csv&gid=1536149592';
const PROXY = 'https://corsproxy.io/?';
const IDS = [71, 72, 73, 74, 75, 76, 77, 78, 79, 80, 81, 82, 83];

async function debug() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(SHEET_URL + '&t=' + Date.now()));
    const csv = await res.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g,'')));
    
    let html = "";
    let partidosEncontrados = [];

    IDS.forEach(id => {
      for (let f = 0; f < rows.length; f++) {
        const c = rows[f].indexOf(id.toString());
        if (c !== -1) {
          partidosEncontrados.push({
            id: id,
            f: f,
            c: c,
            // Datos y sus coordenadas
            hora: rows[f][0], h_coord: `(${f}:0)`,
            eqL: rows[f-1][c+1], l_coord: `(${f-1}:${c+1})`,
            eqV: rows[f-1][c+2], v_coord: `(${f-1}:${c+2})`,
            resL: rows[f][c+1], rl_coord: `(${f}:${c+1})`,
            resV: rows[f][c+2], rv_coord: `(${f}:${c+2})`
          });
          break;
        }
      }
    });

    partidosEncontrados.sort((a,b) => a.f - b.f).forEach(p => {
      const score = (p.resL || p.resV) ? `${p.resL}<span class="debug-info">${p.rl_coord}</span> - ${p.resV}<span class="debug-info">${p.rv_coord}</span>` : `vs <span class="debug-info">ID:${p.id} en (${p.f}:${p.c})</span>`;
      
      html += `
        <div class="match-card">
          <div>
            <span class="time-main">${p.hora || '--:--'}</span>
            <div class="debug-info">${p.h_coord}</div>
          </div>
          <div>
            <div class="team-name">${p.eqL || '---'}<span class="debug-info">${p.l_coord}</span></div>
            <div class="team-name">${p.eqV || '---'}<span class="debug-info">${p.v_coord}</span></div>
          </div>
          <div class="score-col">${score}</div>
        </div>`;
    });

    document.getElementById('log').innerHTML = html || "No se detectaron los IDs en las celdas.";
  } catch (e) {
    document.getElementById('log').innerHTML = "Error de conexión.";
  }
}

debug();
</script>
</body>
</html>
